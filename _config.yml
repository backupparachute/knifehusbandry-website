title: Knife Husbandry
tagline: Keep 'em sharp.
description: >-
  The care and feeding of fine steel. Reviews, lore, and the tending of good knives.
url: https://knifehusbandry.com
baseurl: ""

author:
  name: Knife Husbandry
  email: hello@knifehusbandry.com

timezone: America/New_York
permalink: /journal/:year/:month/:slug/

collections:
  tend:
    output: true
    permalink: /tend/:path/
  choose:
    output: true
    permalink: /choose/:path/
  know:
    output: true
    permalink: /know/:path/

defaults:
  - scope:
      path: ""
      type: tend
    values:
      layout: article
      pillar: tend
  - scope:
      path: ""
      type: choose
    values:
      layout: article
      pillar: choose
  - scope:
      path: ""
      type: know
    values:
      layout: article
      pillar: know
  - scope:
      path: ""
      type: posts
    values:
      layout: article

pillars:
  - slug: tend
    title: Tend
    blurb: Care, sharpening, and the slow work of keeping an edge.
  - slug: choose
    title: Choose
    blurb: Reviews and considered recommendations. Knives worth keeping.
  - slug: know
    title: Know
    blurb: History, lore, metallurgy, and the traditions behind the steel.

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  smart_quotes: ["apos", "apos", "quot", "quot"]

sass:
  style: compressed
  load_paths:
    - _sass

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: feed.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .github
  - .sass-cache
  - .jekyll-cache
  - Dockerfile
  - docker-compose.yml
