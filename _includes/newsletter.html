<section class="newsletter" aria-labelledby="newsletter-heading">
  <h2 id="newsletter-heading" class="eyebrow mb-2">Dispatches</h2>
  <p class="newsletter-copy">Occasional dispatches on blades worth keeping.</p>
  <form class="newsletter-form" action="#" method="post" aria-label="Newsletter signup">
    <label for="newsletter-email" class="visually-hidden">Email</label>
    <input type="email"
           id="newsletter-email"
           name="email"
           class="newsletter-input"
           placeholder="you@somewhere.com"
           required>
    <button type="submit" class="newsletter-submit">Subscribe</button>
  </form>
</section>
