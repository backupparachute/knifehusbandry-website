---
layout: default
---
<article class="article">
  <div class="container">
    <header class="article-header">
      <h1 class="article-title">{{ page.title }}</h1>
      {% if page.dek %}<p class="article-dek">{{ page.dek }}</p>{% endif %}
    </header>

    <div class="article-body">
      {{ content }}
    </div>
  </div>
</article>
